name: Import Existing Config into Terraform State (PROD)

concurrency: prod

on:
  workflow_dispatch:
    inputs:
      resource_ID:
        type: string
        description:
          'The resource identifier to be used as the first parameter in `terraform import` command
          Note: Single-quote this value and make sure any single-quotes are escaped within the value.'
        required: true
      ID:
        type: string
        description:
          'The identifier to be used as the second parameter in `terraform import` command.
          This can be found in Terraform Okta provider docs.
          Note: Single-quote this value and make sure any single-quotes are escaped within the value.'
        required: true

jobs:
  approval:
    runs-on: [ubuntu-latest]
    environment: with-approval

    steps:
      - name: Approval
        run: echo 'Import is approved'

  import_config_into_terraform_prod:
    needs: approval
    uses: ./.github/workflows/_import_into_terraform.yml
    with:
      environment: prod

      resource_ID: ${{ inputs.resource_ID }}
      ID: ${{ inputs.ID }}

      AZURE_BACKEND_RESOURCE_GROUP_NAME: 'rg-kul-prod-tfstate-westeurope'
      AZURE_BACKEND_STORAGE_ACCOUNT_NAME: 'kulprodtfstatewesteurope'
      AZURE_BACKEND_CONTAINER_NAME: 'prodtfstate'
      AZURE_BACKEND_KEY: 'okta-prod'
      KEY_VAULT_NAME: kv-kul-prod-001
      KEY_VAULT_OKTA_API_TOKEN_KEY: kul-prod-OKTA-API-KEY
      OKTA_ORG_NAME: 'knaufcustomer'
      OKTA_BASE_URL: 'okta.com'
      TF_VAR_accountLinkURL: 'account.knauf.com'
      TF_VAR_emailSubjectSuffix: ''
      TF_VAR_supportEmail: 'app-support@knauf.com'
    secrets: inherit
