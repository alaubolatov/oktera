name: Plan and Deploy to Okta (PROD)

concurrency: prod

on:
  workflow_dispatch:

jobs:
  terraform_plan:
    uses: ./.github/workflows/_terraform_plan.yml
    with:
      environment: prod
      AZURE_BACKEND_RESOURCE_GROUP_NAME: 'rg-kul-prod-tfstate-westeurope'
      AZURE_BACKEND_STORAGE_ACCOUNT_NAME: 'kulprodtfstatewesteurope'
      AZURE_BACKEND_CONTAINER_NAME: 'prodtfstate'
      AZURE_BACKEND_KEY: 'okta-prod'
      KEY_VAULT_NAME: kv-kul-prod-001
      KEY_VAULT_OKTA_API_TOKEN_KEY: kul-prod-OKTA-API-KEY
      OKTA_ORG_NAME: 'knaufcustomer'
      OKTA_BASE_URL: 'okta.com'
      TF_VAR_accountLinkURL: 'account.knauf.com'
      TF_VAR_emailSubjectSuffix: ''
      TF_VAR_supportEmail: 'app-support@knauf.com'
    secrets: inherit

  approval:
    needs: terraform_plan
    if: github.event_name == 'workflow_dispatch'

    runs-on: [ubuntu-latest]
    environment: with-approval

    steps:
      - name: Approval
        run: echo 'Deployment is approved'

  terraform_apply:
    needs: approval
    uses: ./.github/workflows/_deploy_to_okta.yml
    with:
      environment: prod
      AZURE_BACKEND_RESOURCE_GROUP_NAME: 'rg-kul-prod-tfstate-westeurope'
      AZURE_BACKEND_STORAGE_ACCOUNT_NAME: 'kulprodtfstatewesteurope'
      AZURE_BACKEND_CONTAINER_NAME: 'prodtfstate'
      AZURE_BACKEND_KEY: 'okta-prod'
      KEY_VAULT_NAME: kv-kul-prod-001
      KEY_VAULT_OKTA_API_TOKEN_KEY: kul-prod-OKTA-API-KEY
      OKTA_ORG_NAME: 'knaufcustomer'
      OKTA_BASE_URL: 'okta.com'
      TF_VAR_accountLinkURL: 'account.knauf.com'
      TF_VAR_emailSubjectSuffix: ''
      TF_VAR_supportEmail: 'app-support@knauf.com'
    secrets: inherit

  sync_app_countries:
    needs: terraform_apply
    uses: ./.github/workflows/_sync_app_countries.yml
    with:
      environment: prod
    secrets: inherit
