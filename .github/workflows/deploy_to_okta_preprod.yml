name: Plan and Deploy to Okta (PREPROD)

concurrency: preprod

on:
  workflow_dispatch:

jobs:
  terraform_plan:
    uses: ./.github/workflows/_terraform_plan.yml
    with:
      environment: preprod
      AZURE_BACKEND_RESOURCE_GROUP_NAME: 'rg-kul-preprod-tfstate-westeurope'
      AZURE_BACKEND_STORAGE_ACCOUNT_NAME: 'kulpreprodtfstatewesteu'
      AZURE_BACKEND_CONTAINER_NAME: 'tfstate'
      AZURE_BACKEND_KEY: 'okta-preprod'
      KEY_VAULT_NAME: kv-kul-preprod-001
      KEY_VAULT_OKTA_API_TOKEN_KEY: kul-preprod-OKTA-API-KEY
      OKTA_ORG_NAME: 'preprod-knaufcustomer'
      OKTA_BASE_URL: 'okta.com'
      TF_VAR_accountLinkURL: 'account.preprod.knauf.com'
      TF_VAR_emailSubjectSuffix: '(Preprod)'
      TF_VAR_supportEmail: 'app-support@knauf.com'
    secrets: inherit

  approval:
    needs: terraform_plan
    if: github.event_name == 'workflow_dispatch'

    runs-on: [ubuntu-latest]
    environment: with-approval

    steps:
      - name: Approval
        run: echo 'Deployment is approved'

  terraform_apply:
    needs: approval
    uses: ./.github/workflows/_deploy_to_okta.yml
    with:
      environment: preprod
      AZURE_BACKEND_RESOURCE_GROUP_NAME: 'rg-kul-preprod-tfstate-westeurope'
      AZURE_BACKEND_STORAGE_ACCOUNT_NAME: 'kulpreprodtfstatewesteu'
      AZURE_BACKEND_CONTAINER_NAME: 'tfstate'
      AZURE_BACKEND_KEY: 'okta-preprod'
      KEY_VAULT_NAME: kv-kul-preprod-001
      KEY_VAULT_OKTA_API_TOKEN_KEY: kul-preprod-OKTA-API-KEY
      OKTA_ORG_NAME: 'preprod-knaufcustomer'
      OKTA_BASE_URL: 'okta.com'
      TF_VAR_accountLinkURL: 'account.preprod.knauf.com'
      TF_VAR_emailSubjectSuffix: '(Preprod)'
      TF_VAR_supportEmail: 'app-support@knauf.com'
    secrets: inherit

  sync_app_countries:
    needs: terraform_apply
    uses: ./.github/workflows/_sync_app_countries.yml
    with:
      environment: preprod
    secrets: inherit
