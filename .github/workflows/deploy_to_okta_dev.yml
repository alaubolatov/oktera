name: Plan and Deploy to Okta (DEV)

concurrency: dev

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/okta/**'
      - 'settings/**'
      - '.github/workflows/deploy_to_okta_dev.yml'
  pull_request:
    # we don't `terraform apply` when it's just a PR, we only validate+plan
    branches:
      - main
    paths:
      - 'terraform/okta/**'
      - 'settings/emails/**'
  workflow_dispatch:

jobs:
  deploy_to_okta_dev:
    uses: ./.github/workflows/_deploy_to_okta.yml
    with:
      environment: dev
      AZURE_BACKEND_RESOURCE_GROUP_NAME: 'rg-kul-dev-tfstate-westeurope'
      AZURE_BACKEND_STORAGE_ACCOUNT_NAME: 'kuldevtfstatewesteurope'
      AZURE_BACKEND_CONTAINER_NAME: 'tfstate'
      AZURE_BACKEND_KEY: 'okta-dev'
      KEY_VAULT_NAME: kv-kul-dev-001
      KEY_VAULT_OKTA_API_TOKEN_KEY: kul-dev-OKTA-API-KEY
      OKTA_ORG_NAME: 'dev-knaufcustomer'
      OKTA_BASE_URL: 'okta.com'
      TF_VAR_accountLinkURL: 'account.dev.knauf.digital'
      TF_VAR_emailSubjectSuffix: '(Dev)'
      TF_VAR_supportEmail: 'app-support@knauf.com'
    secrets: inherit

  sync_app_countries:
    needs: deploy_to_okta_dev
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_sync_app_countries.yml
    with:
      environment: dev
    secrets: inherit
