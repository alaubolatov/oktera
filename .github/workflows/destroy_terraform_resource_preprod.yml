name: Destroy Terraform Resource from State (PREPROD)

concurrency: preprod

on:
  workflow_dispatch:
    inputs:
      resource_ID:
        type: string
        description:
          'The resource identifier to be removed from terraform state.
          Note: Single-quote this value and make sure any single-quotes are escaped within the value.'
        required: true
      force_destroy:
        type: boolean
        description: 'Force destroy resources with prevent_destroy lifecycle rule (temporarily removes the rule)'
        required: false
        default: false

jobs:
  approval:
    runs-on: [ubuntu-latest]
    environment: with-approval

    steps:
      - name: Approval
        run: echo 'Destroy operation is approved'

  destroy_terraform_resource_preprod:
    needs: approval
    uses: ./.github/workflows/_destroy_terraform_resource.yml
    with:
      environment: preprod
      resource_ID: ${{ inputs.resource_ID }}
      force_destroy: ${{ inputs.force_destroy }}

      AZURE_BACKEND_RESOURCE_GROUP_NAME: 'rg-kul-preprod-tfstate-westeurope'
      AZURE_BACKEND_STORAGE_ACCOUNT_NAME: 'kulpreprodtfstatewesteu'
      AZURE_BACKEND_CONTAINER_NAME: 'tfstate'
      AZURE_BACKEND_KEY: 'okta-preprod'
      KEY_VAULT_NAME: kv-kul-preprod-001
      KEY_VAULT_OKTA_API_TOKEN_KEY: kul-preprod-OKTA-API-KEY
      OKTA_ORG_NAME: 'preprod-knaufcustomer'
      OKTA_BASE_URL: 'okta.com'
      TF_VAR_accountLinkURL: 'account.preprod.knauf.com'
      TF_VAR_emailSubjectSuffix: '(Preprod)'
      TF_VAR_supportEmail: 'app-support@knauf.com'
    secrets: inherit