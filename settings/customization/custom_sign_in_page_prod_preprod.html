<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="none"/>
    <link rel="shortcut icon" href="{{faviconUrl}}" type="image/x-icon"/>

    <title>{{pageTitle}}</title>
    {{{SignInWidgetResources}}}
    <style>
        * {
            font-family: Arial !important;
        }

        /* hide unwanted links */
        li:has(> .link.custom),
        li:has(> .link.js-unlock),
        li:has(> .link.js-help-link),
        .link.help.js-help,
        li:has(> .link.js-custom),
        a.link.custom,
        a.link.js-unlock,
        a.link.js-help-link,
        a.link.js-help,
        a.link.js-custom {
            display: none !important;
        }

        html {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #okta-login-container {
            flex: 1;
        }

        /* remove the beacon that is introduced with identity engine */
        .beacon-container {
            display: none !important;
        }

        /* make padding-top consistent between signin steps */

        #okta-sign-in .auth-content, #okta-sign-in.no-beacon .auth-content, .auth-content {
            padding-top: 40px !important;
            padding-bottom: 20px !important;
        }

        #help-links-container {
            display: block !important;
        }

        #okta-sign-in .okta-form-title {
            color: #3C3C3C;
            font-size: 24px !important;
            font-weight: 600;
            line-height: 30px;
            margin-top: 0;
            margin-bottom: 40px;
        }

        header {
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
        }

        header .logo {
            height: 46px;
        }

        footer {
            padding: 27px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 14px;
            color: #FFF;
            background-color: #00326D;
        }

        footer span {
            color: rgba(255, 255, 255, 0.7);
        }

        #okta-sign-in .siw-main-view .custom-checkbox label {
            font-size: 14px;
        }

        .custom-legal-links-template {
            display: block;
        }

        .custom-legal-link {
            font-weight: normal !important;
            color: #fff !important;
            padding: 0 6px;
            cursor: pointer;
        }

        .custom-legal-link:hover {
            text-decoration: none;
        }

        @media (max-width: 599px) {
            #okta-sign-in .auth-content {
                padding-top: 0;
            }

            #okta-sign-in.no-beacon .auth-content {
                padding-top: 0;
            }

            footer {
                flex-direction: column;
                justify-content: space-between;
                text-align: center;
                gap: 16px;
            }

            .custom-legal-links-template {
                flex-direction: column;
                display: flex;
                gap: 24px;
            }

            #okta-sign-in .okta-custom-buttons-container {
                flex-direction: column;
            }

            #okta-sign-in .default-custom-button.link-button {
                height: initial;
            }

            .custom-legal-link {
                padding: 0;
            }
        }

        #okta-sign-in .default-custom-button.link-button:last-of-type {
            margin-bottom: 0 !important;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            border: 1px solid #B3B3B3;
            background-color: transparent !important;
        }

        main#okta-sign-in.auth-container {
            width: 100%;
            max-width: 684px;
        }

        #okta-sign-in.auth-container.main-container {
            margin: 45px auto 20px;
        }

        #okta-sign-in .o-form .input-fix {
            height: 50px;
        }

        #okta-sign-in.auth-container .okta-form-label #okta-sign-in .siw-main-footer .auth-footer .link {
            font-size: 12px !important;
            line-height: 12px !important;
            font-weight: 400 !important;
            color: #656565 !important;
        }

        #okta-sign-in.auth-container .link:hover {
            text-decoration: none;
        }

        #okta-sign-in .o-form .input-fix input {
            padding: 15px;
        }

        .o-form-input input {
            background: transparent !important;
            border: 1px solid #B3B3B3 !important;
        }

        .o-form-input input:hover {
            border: 1px solid #818181 !important;
        }

        .o-form-input input:focus {
            border: 2px solid #0099DE !important;
            box-shadow: none !important;
        }


        .o-form-fieldset.o-form-label-top .o-form-input .o-form-explain {
            display: none;
        }

        .focused-input {
            box-shadow: none !important;
        }

        #okta-sign-in.auth-container .okta-form-input-field {
            border: 0 none;
        }

        #okta-sign-in .default-custom-button {
            font-size: 16px !important;
            line-height: 22px !important;
            font-weight: 400 !important;
            background: transparent;
            border: none;
        }

        #okta-sign-in .okta-custom-buttons-container {
            display: flex;
            justify-content: center;
        }

        #okta-sign-in .default-custom-button:hover, #okta-sign-in .default-custom-button:focus {
            background: transparent;
        }

        .button {
            border: 0 none !important;
            font-weight: bold;
        }

        .button.button-primary {
            background-color: #003778 !important;
            color: #fff !important;
        }

        #okta-sign-in.auth-container .button-primary {
            font-size: 16px !important;
            line-height: 18px !important;
            background: #003778 !important;
            color: #fff !important;
        }

        a {
            color: #003778 !important;
            font-weight: bold !important;
        }

        .okta-sign-in-header {
            display: none;
        }

        .custom-sign-up-link-template {
            font-size: 16px !important;
            line-height: 22px !important;
            font-weight: 400 !important;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        .custom-sign-up-link-template a:hover,
        .custom-sign-up-link-template a:focus,
        .custom-sign-up-link-template a:active {
            background-color: transparent;
        }

        .custom-sign-up-link-template a {
            line-height: 1.4 !important;
            height: auto !important;
            width: auto !important;
        }

        .custom-sign-up-text {
            color: #777 !important;
            font-weight: 400 !important;
            text-decoration: none;
            cursor: auto;
            width: unset !important
        }

        .custom-sign-up-button {
            padding-left: 5px !important;
            width: unset !important
        }

        @media (min-width: 600px) {
            #okta-sign-in .auth-content {
                padding: 60px 110px;
            }
        }
    </style>
</head>

        },
    ];

    function createCustomLegalLinks() {
        var legalLinksInFooterTemplate = document.getElementById(
            "custom-links-template"
        );

        if (!legalLinksInFooterTemplate || legalLinksInFooterTemplate.children.length > 0) {
            return;
        }

        for (var i = 0; i < legalLinksConfig.length; i++) {
            var item = legalLinksConfig[i];
            var link = document.createElement("a");
            link.classList.add("custom-legal-link");
            link.innerHTML = config.i18n[config.language][item.i18n];
            link.setAttribute("href", item.href);
            legalLinksInFooterTemplate.appendChild(link);
        }
    }

    createCustomLegalLinks();

    var oktaSignIn = new OktaSignIn(config);
