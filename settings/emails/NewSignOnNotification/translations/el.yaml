languageCode: "el"
subject: "Ειδοποίηση νέας σύνδεσης"
title: "Εντοπίστηκε νέα σύνδεση για τον λογαριασμό σας Okta"
greeting: "Αγαπητέ ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: 'Ο λογαριασμός σας <strong>Okta</strong>
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>
  ρησιμοποιήθηκε μόλις για σύνδεση από νέα ή μη αναγνωρισμένη συσκευή, πρόγραμμα περιήγησης ή εφαρμογή.'
paragraph2: "<strong>Λεπτομέρειες σύνδεσης</strong> <br />
 ${request.browser} <br />
 ${request.date} <br />
 ${request.location} <br />
 IP: ${request.ipAddress}"
paragraph3: "<strong>Δεν αναγνωρίζετε αυτήν τη δραστηριότητα;</strong>
  <br />
  Ο λογαριασμός σας μπορεί να έχει παραβιαστεί. συνιστούμε να αναφέρετε την ύποπτη δραστηριότητα στον οργανισμό σας."
paragraph4: "Η ασφάλεια του λογαριασμού σας είναι πολύ σημαντική για εμάς
  και θέλουμε να διασφαλίσουμε ότι θα ενημερώνεστε όταν γίνονται σημαντικές ενέργειες."
paragraph5:
  "Δεν μπορέσαμε να προσδιορίσουμε εάν είχατε συνδεθεί στο παρελθόν με αυτήν τη συσκευή στο παρελθόν.
  Αυτή η ειδοποίηση είναι συνηθισμένη εάν συνδέεστε σε μια νέα συσκευή, ένα νέο πρόγραμμα περιήγησης, έχετε διαγράψει το δικό σας
  cookie ή έχετε πρόσβαση στο Okta σε κατάσταση ανώνυμης περιήγησης."
reportSuspiciousActivityButtonText: "Αναφορά ύποπτης δραστηριότητας"
footerText: "Αυτό είναι ένα αυτοματοποιημένο μήνυμα ηλεκτρονικού ταχυδρομείου. Οι απαντήσεις δεν παρακολουθούνται ούτε απαντώνται."
