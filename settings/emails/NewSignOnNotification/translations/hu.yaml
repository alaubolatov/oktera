languageCode: "hu"
subject: "Új bejelentkezési értesítés"
title: "Új bejelentkezés észleltünk az Okta-fiókjához"
greeting: "Kedves ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: 'Az Ön <strong>Okta</strong> fiókja 
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>
  csak egy új vagy felismerhetetlen eszközről, böngészőből vagy alkalmazásból való bejelentkezéshez használták.'
paragraph2: "<strong>Bejelentkezési részletek</strong><br />
  ${request.browser} <br />
  ${request.date} <br />
  ${request.location} <br />
