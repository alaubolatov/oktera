paragraph3: "<strong>Nem ismeri fel ezt a tevékenységet?</strong>
  <br />
  Lehet, hogy fiókja veszélybe került; Javasoljuk, hogy jelentse a gyanús tevékenységet a szervezetének."
paragraph4: "Fiókja biztonsága nagyon fontos számunkra, és azt szeretnénk biztosítani, hogy fontos intézkedések megtételekor frissüljenek."
paragraph5: "Nem tudtuk meghatározni, hogy korábban bejelentkezett-e ezzel az eszközzel. Ez az értesítés gyakori, ha új eszközről vagy egy új böngészőből jelentkezik, törölte a sütiket, vagy inkognitó módban jeletkezik be az Oktába."
