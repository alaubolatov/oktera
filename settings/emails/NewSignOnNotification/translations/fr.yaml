languageCode: "fr"
subject: "Notification de nouvelle connexion"
title: "Nouvelle connexion détectée sur votre compte Okta"
greeting: "Bonjour ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: 'Une connexion à partir d’un appareil, d’une application ou
  d’un navigateur nouveau ou inconnu vient d’être détectée sur votre compte <strong>Okta</strong>
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>.'
paragraph2: "<strong>Détails de cette connexion</strong> <br />
  ${request.browser} <br />
  ${request.date} <br />
  ${request.location} <br />
  IP: ${request.ipAddress}"
paragraph3: "<strong>Vous n’êtes pas à l’origine de cette activité?</strong>
  <br />
  La sécurité de votre compte est peut-être compromise. Nous
  vous recommandons de signaler cette activité suspecte à votre
  entreprise."
paragraph4:
  "Nous prenons très au sérieux la sécurité de votre compte et nous veillons
  à vous informer des événements importants relatifs à votre compte."
paragraph5: "Nous ne sommes pas en mesure de déterminer si vous vous êtes
  déjà connecté(e) à partir de cet appareil. Vous recevez
  généralement cette notification lorsque vous vous connectez
  depuis un nouvel appareil ou navigateur, si vous avez supprimé
  vos cookies ou si vous accédez à Okta en mode privé."
reportSuspiciousActivityButtonText: "Signaler une activité suspecte"
footerText: "Cet e-mail a été généré automatiquement. Les réponses à cet e-mail ne seront ni lues, ni traitées."
footerWithDateTimeText:
  "Cet e-mail a été généré automatiquement au ${request.date} à
  ${request.time}. Les réponses à cet e-mail ne seront ni lues, ni traitées."
footerAddress1: "Knauf Digital GmbH <br />
  Landshuter Allee 10 <br />
  80637 München <br />
  Allemagne"
footerAddress2: "Siège: Munich<br />
  Registre: Munich HRB 248534"
