languageCode: "en"
subject: "New sign-on notification"
title: "New sign-on detected for your Okta account"
greeting: "Dear ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: 'Your <strong>Okta</strong> account
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>
  was just used to sign-in from a new or unrecognized device, browser, or application.'
paragraph2: "<strong>Sign-In Details</strong> <br />
  ${request.browser} <br />
  ${request.date} <br />
  ${request.location} <br />
  IP: ${request.ipAddress}"
paragraph3: "<strong>Don't recognize this activity?</strong>
  <br />
  Your account may have been compromised; we recommend reporting the suspicious activity to your organization."
paragraph4: "The security of your account is very important to us and we want to ensure that you are updated when important actions are taken."
paragraph5: "We were unable to determine if you had previously signed in with this device before. This notification is common if you are signing in a new device, a new browser, have deleted your cookies or are accessing Okta in Incognito Mode."
reportSuspiciousActivityButtonText: "Report Suspicious Activity"
footerText: "This is an automated email. Replies are not monitored or answered."
footerWithDateTimeText: "This is an automated email generated on ${request.date} at ${request.time}. Replies are not monitored or answered."
footerAddress1: "Knauf Digital GmbH <br />
  Landshuter Allee 10 <br />
  80637 München"
footerAddress2: "Location: Munich<br />
  Register: Munich HRB 248534"
