languageCode: "nl-NL"
subject: "Nieuwe aanmeldingsmelding"
title: "Nieuwe aanmelding op uw Okta-account gedetecteerd"
greeting: "Beste ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: 'Uw <strong>Okta</strong> account
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>
  is zojuist gebruikt om in te loggen via een nieuw(e) of onbekend(e) apparaat, browser of applicatie.'
paragraph2: "<strong>Aanmeldgegevens</strong> <br />
  ${request.browser} <br />
  ${request.date} <br />
  ${request.location} <br />
  IP: ${request.ipAddress}"
paragraph3: "<strong>Herkent u deze activiteit niet?</strong>
  <br />
  Uw account is mogelijk gecompromitteerd; we raden aan om de verdachte activiteit aan uw organisatie te melden."
paragraph4: "De beveiliging van uw account is erg belangrijk voor ons en we
  willen waarborgen dat u op de hoogte wordt gebracht wanneer er belangrijke acties plaatsvinden."
paragraph5: "We konden niet vaststellen of u zich al eerder met dit
  apparaat had aangemeld. Dit is een gebruikelijke melding als u
  zich aanmeldt met een nieuw apparaat, een nieuwe browser, uw
  cookies hebt gewist of als u Okta opent in incognito-modus."
reportSuspiciousActivityButtonText: "Meld een Verdachte Activiteit"
footerText: "Dit is een geautomatiseerde e-mail. Antwoorden worden niet gecontroleerd of beantwoord."
footerWithDateTimeText:
  "Dit is een geautomatiseerde e-mail die is gegenereerd op
  ${request.date} om ${request.time}. Antwoorden worden niet
  gecontroleerd of beantwoord."
footerAddress1: "Knauf Digital GmbH <br />
  Landshuter Allee 10 <br />
  80637 München"
footerAddress2: "Sitz: München<br />
  Register: München HRB 248534"
