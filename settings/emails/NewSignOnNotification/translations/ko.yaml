languageCode: "ko"
subject: "새로운 로그인 알림"
title: "귀하의 Okta 계정에서 새로운 로그인이 감지되었습니다"
greeting: "안녕하세요 ${f.escapeHtml($!user.profile.firstName)}님,"
paragraph1: '귀하의 <strong>Okta</strong> 계정 <strong><a style="color: #334870; text-decoration: none">${user.profile.login}</a></strong>이(가) 새롭거나 인식되지 않은 기기, 브라우저, 또는 애플리케이션을 통해 방금 로그인되었습니다.'
paragraph2: "<stong>로그인 세부정보</strong> <br />${request.browser}<br/>${request.date} <br />${request.location}<br/>IP:${request.ipAddress}"
paragraph3: "<strong>이 활동을 인식하지 못하나요?</strong>
  <br />
  계정이 손상되었을 수 있습니다. 조직에 의심스러운 활동을 보고하는 것을 권장합니다."
paragraph4: "귀하의 계정 보안은 매우 중요하며, 중요한 조치가 이루어질 때 항상 업데이트를 받을 수 있도록 하고 싶습니다."
paragraph5: "이전에 이 기기에서 로그인했는지 여부를 확인할 수 없었습니다. 이 알림은 새 기기나 새 브라우저에서 로그인하거나, 쿠키를 삭제했거나, 혹은 Chrome의 시크릿 모드에서 Okta에 접속할 경우 일반적으로 발생합니다."
reportSuspiciousActivityButtonText: "의심스러운 활동 보고"
footerText: "이 메일은 자동으로 발송되었습니다. 회신은 확인되거나 답변되지 않습니다."
footerWithDateTimeText: "이 메일은 ${request.date}${request.time}에 자동으로 생성되었습니다. 회신은 확인되거나 답변되지 않습니다."
