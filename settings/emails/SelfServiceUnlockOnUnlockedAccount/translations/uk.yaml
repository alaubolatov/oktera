languageCode: "uk"
subject: "Розблокувати обліковий запис"
title: "Запит на розблокування облікового запису Okta"
greeting: "Шановний(-а) ${f.escapeHtml($!user.profile.firstName)}, "
paragraph1: "Для Вашого облікового запису надіслано запит на розблокування. Якщо Ви не робили цього запиту, негайно зверніться до свого адміністратора. Хтось може намагатися отримати доступ до Вашого облікового запису."
paragraph2: "Якщо Ви зробили цей запит: Ваш обліковий запис не заблоковано, і Ви маєте змогу увійти. Якщо у Вас виникли проблеми зі входом, спробуйте скинути пароль або звернутися до адміністратора."
paragraph3: "Якщо у Вас виникли труднощі з доступом до Вашого облікового запису, надішліть запит про допомогу своєму адміністратору:"
paragraph4: 'Перейдіть на сторінку <a href="${baseURL}/help/login" style="text-decoration: none; color: #334870"><strong>Довідка зі входу</strong></a>. Потім натисніть посилання «Запит допомоги».'
footerText: "Це автоматичний електронний лист. Відповіді не відстежуються та не надаються."
