languageCode: "fr"
subject: "Déverrouiller compte"
title: "Déverrouillage du compte Okta demandé"
greeting: "Cher ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: "Une demande de déverrouillage de compte a été effectuée pour votre compte. Si vous n’avez pas fait cette demande, veuillez contacter immédiatement votre administrateur. Quelqu’un pourrait essayer d’accéder à votre compte."
paragraph2: "Si vous avez fait cette demande : votre compte n’est pas verrouillé et vous devriez pouvoir vous connecter. Si vous rencontrez des difficultés pour vous connecter, essayez de réinitialiser votre mot de passe ou de contacter votre administrateur."
paragraph3: "Si vous rencontrez des difficultés pour accéder à votre compte, envoyez une demande d’aide à votre administrateur :"
paragraph4: 'Accédez à votre page 
  <a href="${baseURL}/help/login" style="text-decoration: none; color: #334870">
  <strong>Aide à la connexion</strong>
  </a>. 
  Cliquez ensuite sur le lien Demander de l’aide.'
footerText: "Cet e-mail a été généré automatiquement. Les réponses à cet e-mail ne seront ni lues, ni traitées."
