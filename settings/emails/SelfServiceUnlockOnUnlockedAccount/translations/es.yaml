languageCode: "es"
subject: "Desbloquear cuenta"
title: "Se solicita desbloqueo de cuenta Okta"
greeting: "Querido ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: "Se realizó una solicitud de desbloqueo de cuenta para su cuenta. Si no realizó esta solicitud, comuníquese con su administrador de inmediato. Alguien podría estar intentando acceder a su cuenta."
paragraph2: "Si realizó esta solicitud: su cuenta no está bloqueada y debería poder iniciar sesión. Si tiene problemas para iniciar sesión, intente restablecer su contraseña o comunicarse con su administrador."
paragraph3: "Si tiene dificultades para acceder a su cuenta, envíe una solicitud de ayuda a su administrador: "
paragraph4: 'Vaya a su página 
  <a href="${baseURL}/help/login" style="text-decoration: none; color: #334870">
  <strong>Ayuda para iniciar sesión</strong>
  </a>. 
  Luego haga clic en el enlace Solicitar ayuda.'
footerText: "Este es un correo electrónico automatizado. Las respuestas no son monitoreadas ni respondidas."
