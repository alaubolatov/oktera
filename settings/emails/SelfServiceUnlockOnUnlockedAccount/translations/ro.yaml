languageCode: "ro"
subject: "Deblocați contul"
title: "S-a solicitat deblocarea contului Okta"
greeting: "Dragă ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: "A fost făcută o solicitare de deblocare a contului pentru contul dvs. Dacă nu ați făcut această solicitare, vă rugăm să contactați imediat administratorul. Cineva ar putea încerca să obțină acces la contul dvs."
paragraph2: "Dacă ați făcut această solicitare: contul dvs. nu este blocat și ar trebui să vă puteți conecta. Dacă întâmpinați probleme la conectare, încercați să vă resetați parola sau să contactați administratorul."
paragraph3: "Dacă întâmpinați dificultăți la accesarea contului, trimiteți o solicitare de ajutor administratorului:"
paragraph4: 'Accesați pagina dvs. 
  <a href="${baseURL}/help/login" style="text-decoration: none; color: #334870">
  <strong>Ajutor pentru conectare</strong>
  </a>. 
  Apoi faceți clic pe linkul Solicitați ajutor.'
