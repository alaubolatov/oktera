languageCode: "nl-NL"
subject: "Account ontgrendelen"
title: "Okta-accountontgrendeling aangevraagd"
greeting: "Beste ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: "Er is een accountontgrendelingsverzoek ingediend voor uw account. Als u dit verzoek niet heeft gedaan, neem dan onmiddellijk contact op met uw beheerder. Mogelijk probeert iemand toegang te krijgen tot uw account."
paragraph2: "Als u dit verzoek heeft gedaan: uw account is niet vergrendeld en u zou moeten kunnen inloggen. Als u problemen ondervindt bij het inloggen, probeer dan uw wachtwoord opnieuw in te stellen of neem contact op met uw beheerder."
paragraph3: "Als u problemen ondervindt bij de toegang tot uw account, stuur dan een hulpverzoek naar uw beheerder: "
paragraph4: 'Ga naar uw 
  <a href="${baseURL}/help/login" style="text-decoration: none; color: #334870">
  <strong>Help bij inloggen</strong>
  </a>. 
  Klik vervolgens op de link Hulp vragen.'
footerText: "Dit is een geautomatiseerde e-mail. Antwoorden worden niet gecontroleerd of beantwoord."
