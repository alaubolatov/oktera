languageCode: "pl"
subject: "Odblokować konto"
title: "Zażądano odblokowania konta Okta"
greeting: "Drogi ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: "Dla Twojego konta złożono prośbę o odblokowanie konta. Jeśli to nie Ty złożyłeś tę prośbę, natychmiast skontaktuj się z administratorem. Ktoś mógł próbować uzyskać dostęp do Twojego konta."
paragraph2: "Jeśli złożyłeś tę prośbę: Twoje konto nie jest zablokowane i powinieneś móc się zalogować. Jeśli masz problemy z logowaniem, spróbuj zresetować hasło lub skontaktuj się z administratorem."
paragraph3: "Jeśli masz trudności z dostępem do swojego konta, wyślij prośbę o pomoc do swojego administratora:"
paragraph4: 'Przejdź na stronę 
  <a href="${baseURL}/help/login" style="text-decoration: none; color: #334870">
  <strong>Pomoc dotycząca logowania</strong>
  </a>. 
  Następnie kliknij łącze Poproś o pomoc.'
footerText:
  "Ten e-mail został wysłany automatycznie. Nie odpowiadaj na niego. Twoje
  wiadomości nie będą analizowane i nie otrzymasz na nie odpowiedzi."
