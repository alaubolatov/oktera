languageCode: "el"
subject: "Ξεκλείδωμα λογαριασμού"
title: "Ζητήθηκε ξεκλείδωμα λογαριασμού Okta"
greeting: "Αγαπητέ ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: "Έγινε αίτημα ξεκλειδώματος λογαριασμού για τον λογαριασμό σας. Εάν δεν υποβάλατε αυτό το αίτημα, επικοινωνήστε αμέσως με τον διαχειριστή σας. Κάποιος μπορεί να προσπαθεί να αποκτήσει πρόσβαση στον λογαριασμό σας."
paragraph2: "Εάν υποβάλατε αυτό το αίτημα: ο λογαριασμός σας δεν είναι κλειδωμένος και θα πρέπει να μπορείτε να συνδεθείτε. Εάν αντιμετωπίζετε προβλήματα με τη σύνδεση, δοκιμάστε να επαναφέρετε τον κωδικό πρόσβασής σας ή να επικοινωνήσετε με τον διαχειριστή σας."
paragraph3: "Εάν αντιμετωπίζετε δυσκολίες πρόσβασης στο λογαριασμό σας, στείλτε ένα αίτημα βοήθειας στον διαχειριστή σας:"
paragraph4: 'Μεταβείτε στη 
  <a href="${baseURL}/help/login" style="text-decoration: none; color: #334870">
  <strong>Βοήθεια σύνδεσης</strong>
  </a> 
  σελίδα. Στη συνέχεια, κάντε κλικ στο σύνδεσμο Αίτημα βοήθειας.'
footerText: "Αυτό είναι ένα αυτοματοποιημένο μήνυμα ηλεκτρονικού ταχυδρομείου. Οι απαντήσεις δεν παρακολουθούνται ούτε απαντώνται."
