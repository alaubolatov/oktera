languageCode: "el"
subject: "Ξεκλείδωμα λογαριασμού"
title: "Ζητήθηκε ξεκλείδωμα λογαριασμού Okta"
greeting: "Αγαπητέ ${f.escapeHtml($!user.profile.firstName)},"
paragraph1:
  "Έγινε αίτημα ξεκλειδώματος λογαριασμού για τον λογαριασμό σας <strong>Okta</strong>.
   Εάν δεν υποβάλατε αυτό το αίτημα, επικοινωνήστε αμέσως με τον διαχειριστή του συστήματός σας."
paragraph2: 'Κάντε κλικ σε αυτόν τον σύνδεσμο για να ξεκλειδώσετε τον λογαριασμό για το όνομα χρήστη σας
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>:'
paragraph3: "Αυτός ο σύνδεσμος λήγει σε ${f.formatTimeDiffDateNowInUserLocale($!unlockAccountTokenExpirationDate)}."
paragraph4: "Εάν αντιμετωπίζετε δυσκολίες πρόσβασης στον λογαριασμό σας, στείλτε ένα αίτημα βοήθειας στον διαχειριστή σας:"
