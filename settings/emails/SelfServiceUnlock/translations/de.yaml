languageCode: "de"
subject: "Konto freischalten"
title: "Okta-Konto-Freischaltung angefordert"
greeting: "Hallo ${f.escapeHtml($!user.profile.firstName)} ${f.escapeHtml($!user.profile.lastName)},"
paragraph1: "Für Ihr <strong>Okta</strong>-Konto wurde eine Anfrage zur
  Entsperrung des Kontos gestellt. Wenn Sie diese Anforderung
  nicht gestellt haben, wenden Sie sich bitte umgehend an Ihren Systemadministrator."
paragraph2: 'Klicken Sie auf diesen Link, um das Konto für Ihren Benutzernamen
