languageCode: "vi"
subject: "Mở khóa tài khoản"
title: "Yêu cầu mở khóa tài khoản Okta"
greeting: "Kính gửi ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: "Yêu cầu mở khóa tài khoản đã được gửi cho tài khoản <strong>Okta</strong> của bạn. Nếu bạn không thực hiện yêu cầu này, vui lòng liên hệ ngay với quản trị viên hệ thống."
paragraph2: 'Nhấn vào liên kết này để mở khóa tài khoản cho tên người dùng
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>:'
paragraph3: "Liên kết này sẽ hết hạn sau ${f.formatTimeDiffDateNowInUserLocale($!unlockAccountTokenExpirationDate)}."
paragraph4: "Nếu bạn gặp khó khăn khi truy cập tài khoản, hãy gửi yêu cầu hỗ trợ đến quản trị viên của bạn:"
