paragraph3: "Tämä linkki vanhenee ${f.formatTimeDiffHoursNowInUserLocale($!org.activationTokenExpirationHours)} tunnin kuluttua."
paragraph4: 'Käyttäjätunnuksesi on
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>
  <br />
  Organisaatiosi kirjautumissivu on'
paragraph5: "Jos sinulla on ongelmia tilillesi kirjautumisessa, voit lähettää tukipyynnön osoitteeseen:"
