languageCode: "uk"
subject: "Активуйте свій обліковий запис"
title: "Активуйте свій обліковий запис"
greeting: "Шановний(-а) ${f.escapeHtml($!user.profile.firstName)}, "
paragraph1: "Дякуємо за Вашу реєстрацію."
paragraph2: "<strong>Knauf</strong> використовує <strong>Okta</strong> для керування вашими веб-застосунками та створив для вас обліковий запис користувача Okta. Будь ласка, перейдіть за наступним посиланням, щоб підтвердити свою адресу електронної пошти та встановити пароль для активації облікового запису:"
paragraph3: "Термін дії цього посилання закінчується через ${f.formatTimeDiffHoursNowInUserLocale($!org.activationTokenExpirationHours)}."
paragraph4: 'Ваше ім’я користувача — <strong> <a style="color: #334870; text-decoration: none"> ${user.profile.login} </a> </strong> <br />. Сторінка входу Вашої організації — '
paragraph5: "Якщо у Вас виникли труднощі з доступом до свого облікового запису, Ви можете надіслати запит про допомогу за адресою:"
activateAccountButtonText: "Активуйте свій обліковий запис"
footerText: "Це автоматичний електронний лист. Відповіді не відстежуються та не надаються."
