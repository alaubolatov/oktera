languageCode: pl
subject: Aktywuj swoje konto
title: Aktywuj swoje konto
greeting: Drogi ${f.escapeHtml($!user.profile.firstName)},
paragraph1: Dziękujemy za rejestrację.
paragraph2:
  "<strong>Knauf</strong> używa <strong>Okta</strong> do zarządzania aplikacjami
  internetowymi i stworzył dla Ciebie konto użytkownika Okta.
  Kliknij poniższy link, aby zweryfikować swój adres e -mail i ustaw hasło, aby aktywować swoje konto:"
paragraph3: Ten link wygasa za ${f.formatTimeDiffHoursNowInUserLocale($!org.activationTokenExpirationHours)}
paragraph4:
  'Twoja nazwa użytkownika to 
  <strong> 
  <a style="color: #334870; text-decoration: none"> ${user.profile.login} </a> 
  </strong> 
  <br />
  Strona logowania Twojej organizacji to'
paragraph5: "Jeśli masz trudności z dostępem do swojego konta, możesz wysłać prośbę o pomoc: "
activateAccountButtonText: Aktywuj swoje konto
footerText:
