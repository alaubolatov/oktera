languageCode: "el"
subject: "Επαναφορά κωδικού πρόσβασης λογαριασμού"
title: "Επαναφορά κωδικού πρόσβασης Okta από διαχειριστή"
greeting: "Αγαπητέ ${f.escapeHtml($!user.profile.firstName)},"
paragraph1:
  "Ο κωδικός πρόσβασης <strong>Okta</strong> έχει επαναφερθεί από τον διαχειριστή του συστήματός σας
  ${f.escapeHtml($!technicalContact.fullName)} στο <strong>Knauf</strong>."
paragraph2: 'Κάντε κλικ σε αυτόν τον σύνδεσμο για να επαναφέρετε τον κωδικό πρόσβασης για το όνομα χρήστη σας
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}:</a>
  </strong>'
paragraph3: "Αυτός ο σύνδεσμος λήγει σε ${f.formatTimeDiffDateNowInUserLocale($!resetPasswordTokenExpirationDate)}."
paragraph4: "Εάν αντιμετωπίζετε δυσκολίες πρόσβασης στον λογαριασμό σας, μπορείτε να στείλετε ένα αίτημα βοήθειας στη διεύθυνση:"
resetPasswordButtonText: "Επαναφορά κωδικού πρόσβασης"
footerText: "Αυτό είναι ένα αυτοματοποιημένο μήνυμα ηλεκτρονικού ταχυδρομείου. Οι απαντήσεις δεν παρακολουθούνται ούτε απαντώνται."
