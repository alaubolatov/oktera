languageCode: "es"
subject: "Restablecer la contraseña de la cuenta"
title: "Restablecimiento de contraseña de Okta por administrador"
greeting: "Estimado ${f.escapeHtml($!user.profile.firstName)},"
paragraph1:
  "Su contraseña Okta ha sido restablecida por su administrador del sistema
  ${f.escapeHtml($!technicalContact.fullName)} en Knauf."
paragraph2:
  'Haga clic en este enlace para restablecer la contraseña de su usuario
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>:'
paragraph3: "Este enlace expira en ${f.formatTimeDiffDateNowInUserLocale($!resetPasswordTokenExpirationDate)}."
paragraph4:
  "Si experimenta dificultades para acceder a su cuenta, envíe una solicitud
  de ayuda a su administrador:"
resetPasswordButtonText: "Restablecer contraseña"
footerText:
  "Este es un correo electrónico automatizado. Las respuestas no son monitoreadas
  ni respondidas."
footerAddress1: "Knauf Digital GmbH <br />
  Landshuter Allee 10 <br />
  80637 München"
footerAddress2: "Ubicación: Munich <br />
