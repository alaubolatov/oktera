languageCode: "vi"
subject: "Đặt lại mật khẩu tài khoản"
title: "Yêu cầu đặt lại mật khẩu Okta"
greeting: "Kính gửi ${f.escapeHtml($!user.profile.firstName)},"
paragraph1: "Yêu cầu đặt lại mật khẩu đã được gửi cho tài khoản <strong>Okta</strong> của bạn. Nếu bạn không thực hiện yêu cầu này, vui lòng liên hệ ngay với quản trị viên hệ thống."
paragraph2: 'Nhấn vào liên kết này để đặt lại mật khẩu cho tên người dùng
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>:'
paragraph3: "Liên kết này sẽ hết hạn sau ${f.formatTimeDiffDateNowInUserLocale($!resetPasswordTokenExpirationDate)}."
paragraph4: "Nếu bạn gặp khó khăn khi truy cập tài khoản, bạn có thể gửi yêu cầu hỗ trợ đến:"
paragraph5: "Không thể sử dụng liên kết? Hãy nhập mã thay thế:"
resetPasswordButtonText: "Đặt lại mật khẩu"
footerText: "Đây là email tự động. Phản hồi sẽ không được theo dõi hoặc trả lời."
