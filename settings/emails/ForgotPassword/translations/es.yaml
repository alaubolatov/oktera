languageCode: es
subject: Restablecer la contraseña de la cuenta
title: Restablecimiento de contraseña de Okta solicitado
greeting: Estimado ${f.escapeHtml($!user.profile.firstName)},
paragraph1:
  Se realizó una solicitud de reinicio de contraseña para su cuenta <strong>Okta</strong>.
  Si no realizó esta solicitud, comuníquese con el administrador de su sistema de
  inmediato.
paragraph2:
  'Haga clic en este enlace para restablecer la contraseña de su usuario
