languageCode: "uk"
subject: "Скидання пароля облікового запису"
title: "Запит на скидання пароля Okta"
greeting: "Шановний(-а) ${f.escapeHtml($!user.profile.firstName)}, "
paragraph1: "Для Вашого облікового запису <strong>Okta</strong> надіслано запит на скидання пароля. Якщо Ви не робили цей запит, негайно зверніться до свого системного адміністратора."
paragraph2: 'Натисніть це посилання, щоб скинути пароль для Вашого імені користувача <strong><a style="color: #334870; text-decoration: none">${user.profile.login}</a></strong>: '
paragraph3: "Термін дії цього посилання закінчується через ${f.formatTimeDiffDateNowInUserLocale($!resetPasswordTokenExpirationDate)}. "
paragraph4: "Якщо у Вас виникли труднощі з доступом до Вашого облікового запису, надішліть запит про допомогу своєму адміністратору:"
paragraph5: "Не можете скористатися посиланням? Введіть код замість цього:"
resetPasswordButtonText: "Скинути пароль"
footerText: "Це автоматичний електронний лист. Відповіді не відстежуються та не надаються."
