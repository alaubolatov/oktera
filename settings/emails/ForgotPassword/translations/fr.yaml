languageCode: "fr"
subject: "Réinitialisation du mot de passe de votre compte"
title: "Demande de réinitialisation du mot de passe Okta"
greeting: "Bonjour ${f.escapeHtml($!user.profile.firstName)},"
paragraph1:
  "Nous avons reçu une demande de réinitialisation du mot de passe associé à votre compte <strong>Okta</strong>.
  Si vous n’êtes pas à l’origine de cette demande, veuillez contacter immédiatement votre administrateur système."
paragraph2:
  'Cliquez sur ce lien pour réinitialiser le mot de passe associé à votre identifiant
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}:</a>
  </strong>'
paragraph3: "Ce lien expire dans ${f.formatTimeDiffDateNowInUserLocale($!resetPasswordTokenExpirationDate)}."
paragraph4: "Si vous rencontrez des difficultés pour accéder à votre compte,
  n’hésitez pas à envoyer une demande d’aide à l’adresse suivante:"
paragraph5: "Impossible d'utiliser le lien ? Entrez le code à la place :"
resetPasswordButtonText: "Réinitialiser le mot de passe"
footerText: "Cet e-mail a été généré automatiquement. Les réponses à cet e-mail ne seront ni lues, ni traitées."
