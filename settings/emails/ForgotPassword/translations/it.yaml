languageCode: it
subject: Ripristino della password dell'account
title: Reimpostazione della password Okta richiesta
greeting: Caro ${f.escapeHtml($!user.profile.firstName)},
paragraph1: È stata presentata una richiesta di reimpostazione della password per
  il tuo account <strong>Okta</strong>. Se non hai fatto questa richiesta, contatta
  immediatamente l'amministratore di sistema.
paragraph2: 'Fai clic su questo link per reimpostare la password per il tuo nome utente
  <strong>
  <a style="color: #334870; text-decoration: none">${user.profile.login}</a>
  </strong>'
paragraph3: Questo link scade in ${f.formatTimeDiffDateNowInUserLocale($!resetPasswordTokenExpirationDate)}.
paragraph4: 'Se hai difficoltà ad accedere al tuo account, invia una richiesta di
  assistenza al proprio amministratore:'
paragraph5: "Impossibile utilizzare il link? Inserisci il codice invece:"
resetPasswordButtonText: Resetta la password
footerText: Questa è un'e-mail automatizzata. Non rispondere a questa e-mail.
footerAddress1: 'Knauf Digital GmbH <br />
  Landshuter Allee 10 <br />
  80637 München'
footerAddress2: 'Seat: München <br />
  Register: München HRB 248534'
